<html>
<head>
    <title>Animaciones CS3</title>
    <style>
        *{
            margin:0px;
            padding:0px;
        }
        .contenedor{
            width:400px;
            height: 200px;
            border:1px solid black;
            position:relative;/*provoca el centrado del div contenedor*/
            margin: 0 auto;/*provoca el centrado del div contenedor*/
            overflow:hidden;
            background-image: url(./assets/campo.jpg);
            background-size: cover;
        }
        .cuadrito{
            width: 50px;
            height: 50px;
            position:absolute;
            left:-100px;
            top:50px;
            animation: cuadrito 10s infinite;
        }
        @keyframes cuadrito{
            0%{
                left:-100px;
                top:150px;
                rotate:0deg;
            }
            50%{
                left:175px;
                top:0px;
                rotate:10deg;
            }
            100%{
                left:400px;
                top:150px;
                rotate:0deg;
            }
        }  

        .cuadrito1{
            width: 50px;
            height: 50px;
            position:absolute;
            left:-100px;
            top:0px;
            animation: cuadrito1 5s infinite;
        }
         @keyframes cuadrito1{
            0%{
                left:-100px;
                top:0px;
                rotate:0deg;
            }
            50%{
                left:175px;
                top:150px;
                rotate:20deg;
            }
            100%{
                left:400px;
                top:0px;
                rotate:0deg;
            }
        }  

        .cuadrito img{
            width: 100px;
            height: 100px;

        }

        .cuadrito1 img{
            width: 30px;
            height: 50px;

        }
        
        
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="cuadrito">
        <img src="./assets/maya.png" alt="">
        </div>
        <div class="cuadrito1">
        <img src="./assets/Barry.png" alt="">
        </div>
    </div>


</body>
</html>
